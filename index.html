<!DOCTYPE html>
<html>
<head>
  <title>Nivel Dios</title>

  <style>
    body {
      background-color: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    #area {
      position: relative;
      width: 100%;
      height: 400px;
      border: 2px solid white;
      margin-top: 20px;
    }

    .boton {
      position: absolute;
      padding: 15px 25px;
      cursor: pointer;
      border: none;
      color: white;
    }

    #verde {
      background-color: green;
    }

    #rojo {
      background-color: red;
    }
  </style>
</head>

<body>

  <h1>🔥 NO TOQUES EL ROJO</h1>
  <p>Puntos: <span id="puntos">0</span></p>
  <p>Tiempo: <span id="tiempo">15</span></p>

  <div id="area">
    <button id="verde" class="boton" onclick="clickVerde()">✔</button>
    <button id="rojo" class="boton" onclick="perder()">✖</button>
  </div>

  <script>
    let puntos = 0;
    let tiempo = 15;

    let area = document.getElementById("area");
    let verde = document.getElementById("verde");
    let rojo = document.getElementById("rojo");

    function mover(boton) {
      let x = Math.random() * (area.clientWidth - 100);
      let y = Math.random() * (area.clientHeight - 50);
      boton.style.left = x + "px";
      boton.style.top = y + "px";
    }

    function clickVerde() {
      if (tiempo > 0) {
        puntos++;
        document.getElementById("puntos").innerText = puntos;
        mover(verde);
        mover(rojo);
      }
    }

    function perder() {
      alert("💀 Tocaste el rojo. Perdiste con " + puntos + " puntos");
      location.reload();
    }

    mover(verde);
    mover(rojo);

    let movimiento = setInterval(() => {
      mover(verde);
      mover(rojo);
    }, 1200);

    let contador = setInterval(() => {
      tiempo--;
      document.getElementById("tiempo").innerText = tiempo;

      if (tiempo === 0) {
        clearInterval(contador);
        clearInterval(movimiento);
        alert("🏆 Ganaste! Puntos: " + puntos);
      }
    }, 1000);
  </script>

</body>
</html>
